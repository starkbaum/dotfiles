;; ============================================================
;;  Polybar config — Archcraft-inspired
;; ============================================================

[colors]
background = #24273A
background-alt = #1E2030
foreground = #CAD3F5
primary = #A6E3A1
secondary = #8BD5CA
alert = #ED8796
disabled = #8087A2
blue    = #8AADF4
mauve   = #C6A0F6
peach   = #F5A97F

[bar/main]
width = 100%
height = 32pt
offset-x = 0
offset-y = 0
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 2
padding-right = 3

module-margin = 2

separator =
separator-foreground = ${colors.disabled}

font-0 = JetBrains Mono Medium:size=10;2
font-1 = Symbols Nerd Font:size=12;2

modules-left = i3
modules-center = spotify
modules-right = ethernet wifi temperature cpu memory filesystem pulseaudio date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/i3]
show-empty = false
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-mode-padding = 2
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.primary}

; Focused workspace
label-focused = %name%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.primary}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

; Unfocused workspace
label-unfocused = %name%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.disabled}

; Visible but not focused
label-visible = %name%
label-visible-foreground = ${colors.secondary}
label-visible-padding = 2

; Urgent workspace
label-urgent = %name%
label-urgent-foreground = ${colors.background}
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = "󰻠 "
format-prefix-foreground = ${colors.blue}
label = "%percentage%%"
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 3
format = <label>
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.mauve}
label = "%mb_used%"
label-foreground = ${colors.foreground}

[module/filesystem]
type = internal/fs
interval = 10
mount-0 = /
format-mounted = <label-mounted>
format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.peach}
label-mounted = "%free%"
label-mounted-foreground = ${colors.foreground}

[module/ethernet]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh eth
interval = 5
label-foreground = ${colors.secondary}

[module/wifi]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh wifi
interval = 5
label-foreground = ${colors.primary}

[module/temperature]
type = internal/temperature
interval = 2
thermal-zone = 0
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon3/temp1_input
warn-temperature = 80
units = true
format = <label>
format-prefix = "󰔏 "
format-prefix-foreground = ${colors.peach}
label = %temperature-c%
label-foreground = ${colors.foreground}
format-warn = <label-warn>
format-warn-prefix = "󰔏 "
format-warn-prefix-foreground = ${colors.alert}
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = 󰖁 muted
label-muted-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}
format-prefix = " "
format-prefix-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/spotify]
type = custom/script
exec = ~/.config/polybar/scripts/spotify.sh
interval = 2
format = <label>
label = %output:0:40:...%
label-foreground = ${colors.foreground}
click-left = playerctl --player=spotify play-pause
click-middle = playerctl --player=spotify previous
click-right = playerctl --player=spotify next
