;; ============================================================
;;  Polybar config — Archcraft-inspired
;; ============================================================

[colors]
background = #24273A
background-alt = #1E2030
foreground = #CAD3F5
primary = #A6E3A1
secondary = #8BD5CA
alert = #ED8796
disabled = #8087A2

[bar/main]
width = 100%
height = 32pt
offset-x = 0
offset-y = 0
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 2
padding-right = 3

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrains Mono Medium:size=10;2
font-1 = Symbols Nerd Font:size=12;2

modules-left = i3
modules-center = spotify-prev spotify-play-pause spotify-next spotify
modules-right = cpu memory filesystem pulseaudio date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/i3]
show-empty = true
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-mode-padding = 2
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.primary}

; Focused workspace
label-focused = %name%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.primary}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

; Unfocused workspace
label-unfocused = %name%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.disabled}

; Visible but not focused
label-visible = %name%
label-visible-foreground = ${colors.secondary}
label-visible-padding = 2

; Urgent workspace
label-urgent = %name%
label-urgent-foreground = ${colors.background}
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted = %percentage_used%%
label-unmounted = %mountpoint%: not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = 󰖁 muted
label-muted-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}
format-prefix = " "
format-prefix-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/spotify]
type = custom/script
exec = ~/.config/polybar/scripts/spotify.sh
interval = 2
format-prefix = ""
label = %output%
label-foreground = ${colors.foreground}
click-left = playerctl --player=spotify previous
click-right = playerctl --player=spotify next
click-middle = playerctl --player=spotify play-pause

[module/spotify-prev]
type = custom/script
exec = echo "󰒮"
interval = 0
label-foreground = ${colors.fg-alt}
click-left = playerctl --player=spotify previous

[module/spotify-play-pause]
type = custom/script
exec = playerctl --player=spotify status 2>/dev/null | sed 's/Playing/󰏤/;s/Paused/󰐊/;s/Stopped/󰐊/'
interval = 2
label-foreground = ${colors.accent}
click-left = playerctl --player=spotify play-pause

[module/spotify-next]
type = custom/script
exec = echo "󰒭"
interval = 0
label-foreground = ${colors.fg-alt}
click-left = playerctl --player=spotify next

