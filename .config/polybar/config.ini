[colors]
background = #00000000
foreground = #CAD3F5
primary = #A6E3A1
secondary = #8BD5CA
alert = #ED8796
disabled = #8087A2
maroon = #EE99A0
blue = #8AADF4
mauve = #C6A0F6
peach = #F5A97F
surface0 = #363A4F
surface1 = #494D64
sapphire = #7DC4E4
lavender = #B7BDF8
flamingo = #F0C6C6

[bar/main]
width = 100%
offset-x = 0
offset-y = 0
height = 24pt
radius = 0
fixed-center = true
override-redirect = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0

border-left-size = 15
border-right-size = 15
border-top-size = 8
border-bottom-size = 4
border-color = #00000000

padding-left = 0
padding-right = 0
module-margin = 1

separator =

font-0 = JetBrains Mono Medium:size=10;2
font-1 = Symbols Nerd Font:size=12;2

modules-left = spotify
modules-center = i3
modules-right = temperature cpu memory filesystem pulseaudio date

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
show-empty = false
fuzzy-match = true

ws-icon-0 = Terminal;󰆍
ws-icon-1 = Dev;󰲋
ws-icon-2 = Browser;󰈹
ws-icon-3 = Music;󰎆
ws-icon-4 = Files;󰉋
ws-icon-5 = Chat;󰭹
ws-icon-6 = Email;󰇮
ws-icon-7 = Notes;󰈙
ws-icon-8 = Database;󰆼
ws-icon-9 = Misc;󰙳

label-mode-padding = 2
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.primary}

label-focused = %icon%
label-focused-foreground = #24273A
label-focused-background = ${colors.primary}
label-focused-padding = 2
label-focused-margin = 1

label-unfocused = %icon%
label-unfocused-foreground = #24273A
label-unfocused-background = ${colors.maroon}
label-unfocused-padding = 2
label-unfocused-margin = 1

label-visible = %icon%
label-visible-foreground = #24273A
label-visible-background = ${colors.maroon}
label-visible-padding = 2
label-visible-margin = 1

label-urgent = %icon%
label-urgent-foreground = #24273A
label-urgent-background = ${colors.alert}
label-urgent-padding = 2
label-urgent-margin = 1

[module/spotify]
type = custom/script
exec = ~/.config/polybar/scripts/spotify.sh
interval = 1
format = <label>
format-padding = 0
label = %output%
click-left = playerctl --player=spotify play-pause
click-middle = playerctl --player=spotify previous
click-right = playerctl --player=spotify next

[module/temperature]
type = internal/temperature
interval = 1
thermal-zone = 0
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon3/temp1_input
warn-temperature = 80
units = true
format = <label>
format-prefix = " 󰔏 "
format-prefix-foreground = #24273A
format-prefix-background = ${colors.peach}
label = " %temperature-c% "
label-foreground = ${colors.peach}
label-background = ${colors.surface0}
format-warn = <label-warn>
format-warn-prefix = " 󰔏 "
format-warn-prefix-foreground = #24273A
format-warn-prefix-background = ${colors.alert}
label-warn = " %temperature-c% "
label-warn-foreground = ${colors.alert}
label-warn-background = ${colors.surface0}
module-margin-left = 2
module-margin-right = 2

[module/cpu]
type = internal/cpu
interval = 1
format = <label>
format-prefix = " 󰻠 "
format-prefix-foreground = #24273A
format-prefix-background = ${colors.blue}
label = " %percentage%% "
label-foreground = ${colors.blue}
label-background = ${colors.surface0}
module-margin-left = 2
module-margin-right = 2

[module/memory]
type = internal/memory
interval = 3
format = <label>
format-prefix = " 󰍛 "
format-prefix-foreground = #24273A
format-prefix-background = ${colors.mauve}
label = " %mb_used% "
label-foreground = ${colors.mauve}
label-background = ${colors.surface0}
module-margin-left = 2
module-margin-right = 2

[module/filesystem]
type = internal/fs
interval = 10
mount-0 = /
format-mounted = <label-mounted>
format-mounted-prefix = " 󰋊 "
format-mounted-prefix-foreground = #24273A
format-mounted-prefix-background = ${colors.flamingo}
label-mounted = " %free% "
label-mounted-foreground = ${colors.flamingo}
label-mounted-background = ${colors.surface0}
module-margin-left = 2
module-margin-right = 2

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = " 󰕾 "
format-volume-prefix-foreground = #24273A
format-volume-prefix-background = ${colors.sapphire}
label-volume = " %percentage%% "
label-volume-foreground = ${colors.sapphire}
label-volume-background = ${colors.surface0}
label-muted = " 󰖁 muted "
label-muted-foreground = ${colors.disabled}
label-muted-background = ${colors.surface0}
module-margin-left = 2
module-margin-right = 2

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
format = <label>
format-prefix = " 󰥔 "
format-prefix-foreground = #24273A
format-prefix-background = ${colors.primary}
label = " %date% "
label-foreground = ${colors.primary}
label-background = ${colors.surface0}
module-margin-left = 2
module-margin-right = 2

[settings]
screenchange-reload = true
pseudo-transparency = false
