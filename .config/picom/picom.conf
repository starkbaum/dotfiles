#-- Shadows --
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;
shadow-exclude = [
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'Polybar'"
];

#-- Fading --
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#-- Opacity --
inactive-opacity = 0.85;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'Rofi'"
];

#-- Blur --
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-exclude = [
    "class_g = 'firefox'",
    "window_type = 'dock'"
];

#-- Backend --
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

#-- Corners --
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
